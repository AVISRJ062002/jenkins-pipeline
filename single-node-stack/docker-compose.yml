services:
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_WEB_JAVAOPTS: "-Xms128m -Xmx256m"
      SONAR_CE_JAVAOPTS: "-Xms128m -Xmx256m"
      SONAR_SEARCH_JAVAOPTS: "-Xms256m -Xmx256m"
      SONAR_SEARCH_JAVAADDITIONALOPTS: "-Dnode.store.allow_mmap=false"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/api/system/status"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 120s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped
    user: root
    depends_on:
      sonarqube:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc.yaml
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false -Xms256m -Xmx512m"
      JENKINS_ADMIN_ID: "${JENKINS_ADMIN_ID}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD}"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      GITHUB_REPO_URL: "${GITHUB_REPO_URL}"
      SONAR_TOKEN: "${SONAR_TOKEN}"
      PUBLIC_JENKINS_URL: "${PUBLIC_JENKINS_URL}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
