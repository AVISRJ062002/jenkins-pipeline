jenkins:
  systemMessage: "Single-node CI/CD stack managed with Docker Compose"
  mode: NORMAL
  numExecutors: 1
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              id: "github-token"
              scope: GLOBAL
              secret: "${GITHUB_TOKEN}"
              description: "GitHub personal access token"
          - string:
              id: "sonar-token"
              scope: GLOBAL
              secret: "${SONAR_TOKEN}"
              description: "SonarQube user token"

unclassified:
  location:
    url: "${PUBLIC_JENKINS_URL}"
  sonarGlobalConfiguration:
    buildWrapperEnabled: false
    installations:
      - name: "sonarqube"
        serverUrl: "http://sonarqube:9000"
        serverAuthenticationToken: "sonar-token"

jobs:
  - script: >
      pipelineJob('cicd-pipeline') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${GITHUB_REPO_URL}')
                }
                branch('*/main')
              }
            }
            scriptPath('jenkins/Jenkinsfile')
            lightweight(true)
          }
        }
        triggers {
          githubPush()
        }
      }
